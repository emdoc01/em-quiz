<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EM Board Quiz Platform</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
input,textarea,button,select{font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:#185FA5!important;box-shadow:0 0 0 2px rgba(24,95,165,0.15)}
button:focus{outline:none}
button:active{transform:scale(0.98)}
code{font-family:monospace}
#root{min-height:100vh}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

</head>
<body>
<div id="root"><div style="text-align:center;padding:5rem 1rem;font-family:sans-serif;color:#666">
  <div style="font-size:32px;margin-bottom:12px">⚕</div>
  <div style="font-size:16px;font-weight:500;margin-bottom:8px">EM Board Quiz Platform</div>
  <div style="font-size:14px">Loading...</div>
</div></div>
<script>
// ── Minimal React-like implementation ──────────────────────────
// We use vanilla JS with a simple state management approach
// to avoid all external dependencies

var BACKEND = "https://script.google.com/macros/s/AKfycbyQSvBTtEVLuCXIGBO314DWXYKXkk3X8wOe8Hf4xBugxsBP5vjLUrMBsIV0mfXchmix/exec";
var ADMIN_KEY = "em_quiz_admin_code";
var QUIZ_DURATION = 45 * 60;

// ── Utilities ──────────────────────────────────────────────────
function api(body) {
  return fetch(BACKEND + "?action=" + body.action, {
    method: "POST", headers: {"Content-Type": "text/plain"},
    body: JSON.stringify(body)
  }).then(function(r){return r.json();});
}

function genCode() {
  return "EM" + Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(10+Math.random()*90);
}

function callClaude(messages, sys) {
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:8000, system:sys, messages:messages})
  }).then(function(r){return r.json();});
}

function parseArr(data) {
  var raw = (data.content||[]).map(function(b){return b.text||"";}).join("");
  var match = raw.match(/\[[\s\S]*/);
  if(!match) throw new Error("No JSON array");
  var str = match[0];
  var lb = str.lastIndexOf("}");
  if(lb!==-1) str = str.slice(0,lb+1)+"]";
  str = str.replace(/,\s*([}\]])/g,"$1");
  try{return JSON.parse(str);}
  catch(e){
    var objs=[],re=/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*/g,m;
    while((m=re.exec(str))!==null){try{objs.push(JSON.parse(m[0]));}catch(e2){}}
    if(objs.length)return objs;
    throw new Error("Parse failed");
  }
}

function parseSub(s) {
  return Object.assign({},s,{
    answers: typeof s.answers==="string"?tryParse(s.answers,{}):s.answers,
    saqScores: typeof s.saqScores==="string"?tryParse(s.saqScores,{}):s.saqScores,
    saqFeedback: typeof s.saqFeedback==="string"?tryParse(s.saqFeedback,{}):s.saqFeedback,
  });
}

function tryParse(str, def) {
  try{return JSON.parse(str||"");}catch(e){return def;}
}

function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}

function el(tag, props, children) {
  var e = document.createElement(tag);
  if(props) {
    Object.keys(props).forEach(function(k) {
      if(k==="style" && typeof props[k]==="object") {
        Object.assign(e.style, props[k]);
      } else if(k.startsWith("on") && typeof props[k]==="function") {
        e.addEventListener(k.slice(2).toLowerCase(), props[k]);
      } else if(k==="className") {
        e.className = props[k];
      } else if(k==="htmlFor") {
        e.htmlFor = props[k];
      } else if(k in e) {
        e[k] = props[k];
      } else {
        e.setAttribute(k, props[k]);
      }
    });
  }
  if(children) {
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(String(c)) : c);
    });
  }
  return e;
}

function div(props,children){return el("div",props,children);}
function span(props,children){return el("span",props,children);}
function p(props,children){return el("p",props,children);}
function h1(props,children){return el("h1",props,children);}
function h2(props,children){return el("h2",props,children);}
function h3(props,children){return el("h3",props,children);}
function btn(props,children){return el("button",props,children);}
function inp(props){return el("input",props);}
function ta(props){return el("textarea",props);}
function code(props,children){return el("code",props,children);}

// ── Styles ─────────────────────────────────────────────────────
var C = {
  wrap: {maxWidth:"820px",margin:"0 auto",padding:"2rem 1rem"},
  card: {background:"#fff",border:"1px solid #e8e6df",borderRadius:"12px",padding:"1.5rem",marginBottom:"1rem",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"},
  inp: {width:"100%",padding:"9px 12px",borderRadius:"8px",border:"1px solid #ddd",fontSize:"14px",background:"#fff",color:"#1a1a1a",transition:"border 0.2s",display:"block"},
  ta: {width:"100%",padding:"9px 12px",borderRadius:"8px",border:"1px solid #ddd",fontSize:"14px",minHeight:"90px",resize:"vertical",background:"#fff",color:"#1a1a1a",display:"block"},
  btn: {padding:"9px 20px",borderRadius:"8px",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:"14px",color:"#1a1a1a",fontWeight:"500"},
  btnP: {padding:"9px 20px",borderRadius:"8px",border:"none",background:"#185FA5",color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:"600"},
  btnS: {padding:"5px 12px",borderRadius:"6px",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:"13px",color:"#444"},
  label: {fontSize:"13px",color:"#666",display:"block",marginBottom:"4px"},
  muted: {fontSize:"13px",color:"#666"},
  err: {color:"#A32D2D",fontSize:"13px",marginBottom:"8px",padding:"8px 12px",background:"#FCEBEB",borderRadius:"6px"},
  prog: {height:"6px",borderRadius:"4px",background:"#eee",overflow:"hidden",margin:"0.5rem 0 1rem"},
  th: {padding:"10px 12px",fontSize:"13px",fontWeight:"600",textAlign:"left",borderBottom:"1px solid #eee",color:"#666",whiteSpace:"nowrap",background:"#f8f8f6"},
  td: {padding:"10px 12px",fontSize:"13px",borderBottom:"1px solid #f0f0ee",verticalAlign:"middle"},
};

function bdg(c) {
  var bg={blue:"#E6F1FB",green:"#EAF3DE",amber:"#FAEEDA",red:"#FCEBEB",gray:"#F1EFE8"};
  var fg={blue:"#185FA5",green:"#3B6D11",amber:"#854F0B",red:"#A32D2D",gray:"#5F5E5A"};
  return {display:"inline-block",padding:"3px 10px",borderRadius:"20px",fontSize:"12px",fontWeight:"600",background:bg[c]||bg.gray,color:fg[c]||fg.gray};
}

function optStyle(sel) {
  return {display:"block",width:"100%",textAlign:"left",padding:"10px 14px",borderRadius:"8px",
    border:"1.5px solid "+(sel?"#185FA5":"#ddd"),background:sel?"#EBF3FB":"#fff",
    cursor:"pointer",fontSize:"14px",color:sel?"#185FA5":"#1a1a1a",marginBottom:"6px",
    fontWeight:sel?"500":"400"};
}

// ── App State ──────────────────────────────────────────────────
var state = {
  view: (function(){
    var s=window.location.search||"";
    if(s.indexOf("page=take")!==-1)return "studentEntry";
    if(s.indexOf("page=results")!==-1)return "checkResults";
    return "home";
  })(),
  loading: true,
  adminPassword: localStorage.getItem(ADMIN_KEY)||null,
  setupStep:1, setupCode:"", setupConfirm:"", setupError:"",
  changeStep:1, changeOld:"", changeNew:"", changeConfirm:"", changeError:"", changeSuccess:false,
  quiz: null,
  archived: [],
  viewingArchive: null,
  generating: false, genProgress:0, genStatus:"",
  pdfText:"", quizTitle:"",
  residents: [],
  newResName:"", newResEmail:"",
  submissions:[],
  currentAnswers:{},
  submittedId:null,
  resultsReleased:false,
  studentResCode:"", studentQuizCode:"",
  entryError:"",
  adminCode:"", adminError:"",
  activeTab:"questions",
  marking:false, markProgress:0,
  resCodeLookup:"", lookupError:"",
  timerLeft: QUIZ_DURATION,
  timerInterval: null,
};

// ── Render engine ──────────────────────────────────────────────
function setState(updates) {
  Object.assign(state, updates);
  render();
}

function render() {
  var root = document.getElementById("root");
  var newContent = renderApp();
  if(newContent) {
    root.innerHTML = "";
    root.appendChild(newContent);
  }
}

// ── Timer ──────────────────────────────────────────────────────
function startTimer() {
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerLeft = QUIZ_DURATION;
  state.timerInterval = setInterval(function(){
    state.timerLeft--;
    if(state.timerLeft <= 0) {
      clearInterval(state.timerInterval);
      submitQuiz();
      return;
    }
    var timerEl = document.getElementById("quiz-timer");
    var timerBar = document.getElementById("quiz-timer-bar");
    if(timerEl) {
      var c = state.timerLeft<300?"#A32D2D":state.timerLeft<600?"#854F0B":"#185FA5";
      timerEl.textContent = fmtTime(state.timerLeft);
      timerEl.style.color = c;
      if(timerBar) timerBar.style.width = Math.round((state.timerLeft/QUIZ_DURATION)*100)+"%";
    }
  }, 1000);
}

// ── Data helpers ───────────────────────────────────────────────
function getMcqs(){return state.quiz&&state.quiz.questions?state.quiz.questions.filter(function(q){return q.type==="mcq";}):[]; }
function getSaqs(){return state.quiz&&state.quiz.questions?state.quiz.questions.filter(function(q){return q.type==="saq";}):[]; }
function getMaxMCQ(){return getMcqs().length*2;}
function getMaxSAQ(){return getSaqs().reduce(function(a,q){return a+q.marks;},0);}
function getMaxTotal(){return getMaxMCQ()+getMaxSAQ();}
function getCurrentSub(){return state.submissions.find(function(s){return s.id===state.submittedId;});}
function getActiveResident(){return state.residents.find(function(r){return r.residentCode===state.studentResCode;});}

function refreshSubmissions() {
  return api({action:"getSubmissions"}).then(function(r){
    if(r.ok&&r.submissions) setState({submissions:r.submissions.map(parseSub)});
  }).catch(function(){});
}

// ── Load data ──────────────────────────────────────────────────
function loadAll() {
  Promise.all([
    api({action:"getQuiz"}).then(function(r){if(r.ok&&r.quizData)state.quiz=JSON.parse(r.quizData);}).catch(function(){}),
    api({action:"getResidents"}).then(function(r){if(r.ok&&r.residents)state.residents=JSON.parse(r.residents);}).catch(function(){}),
    api({action:"getSubmissions"}).then(function(r){if(r.ok&&r.submissions)state.submissions=r.submissions.map(parseSub);}).catch(function(){}),
    api({action:"getReleased"}).then(function(r){if(r.ok)state.resultsReleased=r.released==="true";}).catch(function(){}),
    api({action:"getArchived"}).then(function(r){if(r.ok&&r.archived)state.archived=tryParse(r.archived,[]);}).catch(function(){}),
  ]).finally(function(){setState({loading:false});});
}

// ── Quiz generation ────────────────────────────────────────────
function generateQuiz() {
  if(!state.pdfText)return;
  setState({generating:true,genProgress:5});
  var base="You are a senior Emergency Medicine board examiner creating questions at ABEM/FCEM level for EM residents.\nRULES: 80% from chapter text (facts, tables, algorithms, figures). 20% from recent landmark trials/ACEP guidelines.\nVignettes must include chief complaint, vitals, key exam/investigation findings. Distractors must be plausible.\nquestionSubtype: vignette | factual | table_algorithm | graphic";
  var mcqSys=base+"\nEach MCQ=2 marks. Return ONLY a valid JSON array of exactly 10 MCQ objects, no markdown:\n[{\"id\":\"q1\",\"type\":\"mcq\",\"questionSubtype\":\"vignette\",\"text\":\"...\",\"options\":[\"A. ...\",\"B. ...\",\"C. ...\",\"D. ...\"],\"answer\":\"A\",\"explanation\":\"Full explanation.\"}]\nGenerate EXACTLY 10 MCQs.";
  var saqSys=base+"\nEach SAQ: max 2 subsections (a)(b), total marks 4-6, brief answers. Return ONLY a valid JSON array of exactly 5 SAQ objects:\n[{\"id\":\"s1\",\"type\":\"saq\",\"questionSubtype\":\"algorithm\",\"text\":\"Question with (a)(b)\",\"totalMarks\":5,\"sampleAnswer\":\"(a)...[3m]\\n(b)...[2m]\",\"markingCriteria\":\"(a) 1 mark each for: x,y,z\",\"explanation\":\"Concise explanation.\"}]\nGenerate EXACTLY 5 SAQs.";
  var mcqBatches=[
    {label:"MCQs 1-10",prompt:"Generate MCQs 1-10: ALL 10 must be clinical vignette type with full patient presentation, vitals, exam findings."},
    {label:"MCQs 11-20",prompt:"Generate MCQs 11-20: ALL 10 must be factual testing thresholds, criteria, classifications, drug doses from the chapter."},
    {label:"MCQs 21-30",prompt:"Generate MCQs 21-30: ALL 10 based on tables, scoring systems, diagnostic criteria, algorithms from the chapter."},
    {label:"MCQs 31-40",prompt:"Generate MCQs 31-40: 4 graphic/image-based (ECG, X-ray, lab pattern) and 6 additional clinical vignettes."},
  ];
  var saqBatches=[
    {label:"SAQs 1-5",prompt:"Generate exactly 5 concise board-level EM SAQs. Each: exactly 2 subsections (a)(b), total marks 4-6. Focus on management and clinical decisions."},
    {label:"SAQs 6-10",prompt:"Generate exactly 5 concise board-level EM SAQs. Each: exactly 2 subsections (a)(b), total marks 4-6. Focus on investigations, differentials, evidence-based treatment. Different topics from SAQs 1-5."},
  ];
  var allMCQs=[],allSAQs=[],totalSteps=mcqBatches.length+saqBatches.length;
  function runBatches(batches,sys,collector,offset){
    var chain=Promise.resolve();
    batches.forEach(function(batch,i){
      chain=chain.then(function(){
        var step=offset+i+1;
        setState({genStatus:"Generating "+batch.label+" ("+step+"/"+totalSteps+")...",genProgress:Math.round((step/(totalSteps+1))*90)});
        return callClaude([{role:"user",content:batch.prompt+"\n\nCHAPTER:\n"+state.pdfText}],sys)
          .then(function(data){if(data.error)throw new Error(data.error.message);parseArr(data).forEach(function(q){collector.push(q);});});
      });
    });
    return chain;
  }
  runBatches(mcqBatches,mcqSys,allMCQs,0)
    .then(function(){return runBatches(saqBatches,saqSys,allSAQs,mcqBatches.length);})
    .then(function(){
      var questions=allMCQs.slice(0,40).map(function(q,i){return Object.assign({},q,{id:"q"+(i+1),type:"mcq",marks:2});})
        .concat(allSAQs.slice(0,10).map(function(q,i){return Object.assign({},q,{id:"s"+(i+1),type:"saq",marks:q.totalMarks||5});}));
      if(!questions.length)throw new Error("No questions generated.");
      var code="QUIZ"+Math.random().toString(36).substring(2,7).toUpperCase();
      var newQuiz={title:state.quizTitle||"Medical Quiz",questions:questions,code:code,published:false};
      api({action:"saveQuiz",quizData:JSON.stringify(newQuiz)}).catch(function(){});
      setState({quiz:newQuiz,genProgress:100,genStatus:"Done! "+questions.filter(function(q){return q.type==="mcq";}).length+" MCQs + "+questions.filter(function(q){return q.type==="saq";}).length+" SAQs generated.",generating:false,view:"adminDashboard"});
    })
    .catch(function(err){setState({genStatus:"Error: "+(err.message||String(err)),generating:false});});
}

function submitQuiz() {
  if(state.timerInterval)clearInterval(state.timerInterval);
  var mcqs=getMcqs(),mcqScore=0;
  mcqs.forEach(function(q){
    var ans=(state.currentAnswers[q.id]||"").trim().toUpperCase().charAt(0);
    var correct=(q.answer||"").trim().toUpperCase().charAt(0);
    if(ans&&ans===correct)mcqScore+=2;
  });
  var sid="S"+Date.now();
  var res=getActiveResident();
  var sub={id:sid,residentCode:res.residentCode,name:res.name,email:res.email,answers:state.currentAnswers,submitted:new Date().toLocaleString(),mcqScore:mcqScore,saqScores:{},saqFeedback:{},totalScore:null,maxScore:null};
  var newSubs=state.submissions.concat([sub]);
  api({action:"submitAnswers",id:sid,residentCode:res.residentCode,name:res.name,email:res.email,submitted:sub.submitted,answers:JSON.stringify(state.currentAnswers),mcqScore:mcqScore}).catch(function(){});
  setState({submissions:newSubs,submittedId:sid,view:"submitted"});
}

function markSAQs() {
  var saqs=getSaqs();
  if(!state.submissions.length)return;
  var maxTotal=getMaxTotal();
  setState({marking:true,markProgress:0});
  var updated=state.submissions.slice();
  var chain=Promise.resolve();
  updated.forEach(function(sub,si){
    chain=chain.then(function(){
      setState({markProgress:Math.round((si/updated.length)*90)});
      var saqList=saqs.map(function(q,i){return "SAQ "+(i+1)+" [id:"+q.id+"] [totalMarks:"+q.marks+"]\nQ: "+q.text+"\nSample: "+q.sampleAnswer+"\nCriteria: "+q.markingCriteria+"\nStudent: "+(sub.answers[q.id]||"(no answer)");}).join("\n\n---\n\n");
      var sys="Senior EM board examiner. Mark each SAQ out of its totalMarks. Return ONLY JSON array:\n[{\"id\":\"q_id\",\"score\":0,\"feedback\":\"constructive feedback\"}]";
      return callClaude([{role:"user",content:"Mark "+saqs.length+" SAQs:\n\n"+saqList}],sys)
        .then(function(data){
          if(data.error)throw new Error(data.error.message);
          var results=parseArr(data);
          results.forEach(function(r){sub.saqScores[r.id]=typeof r.score==="number"?r.score:0;sub.saqFeedback[r.id]=r.feedback||"";});
          saqs.forEach(function(q){if(sub.saqScores[q.id]===undefined){sub.saqScores[q.id]=0;sub.saqFeedback[q.id]="Not marked.";}});
        })
        .catch(function(err){saqs.forEach(function(q){sub.saqScores[q.id]=0;sub.saqFeedback[q.id]="Error: "+err.message;});})
        .finally(function(){
          var saqTotal=Object.values(sub.saqScores).reduce(function(a,b){return a+b;},0);
          sub.totalScore=sub.mcqScore+saqTotal; sub.maxScore=maxTotal;
          updated[si]=sub;
          api({action:"updateMarking",id:sub.id,saqScores:JSON.stringify(sub.saqScores),saqFeedback:JSON.stringify(sub.saqFeedback),totalScore:sub.totalScore,maxScore:sub.maxScore}).catch(function(){});
          setState({submissions:updated.slice()});
        });
    });
  });
  chain.finally(function(){setState({markProgress:100,marking:false});});
}

function archiveQuiz() {
  var newArchived=state.archived.concat([{quiz:Object.assign({},state.quiz),submissions:state.submissions.slice(),residents:state.residents.slice(),archivedAt:new Date().toLocaleString()}]);
  api({action:"saveArchived",archived:JSON.stringify(newArchived)}).catch(function(){});
  api({action:"deleteQuiz"}).catch(function(){});
  api({action:"clearSubmissions"}).catch(function(){});
  api({action:"saveResidents",residents:"[]"}).catch(function(){});
  api({action:"saveReleased",released:"false"}).catch(function(){});
  setState({archived:newArchived,quiz:null,submissions:[],resultsReleased:false,residents:[],activeTab:"questions",view:"adminDashboard"});
}

function getPageUrl(page){return window.location.origin+window.location.pathname+"?page="+page;}

function copyText(text){
  var el=document.createElement("textarea");el.value=text;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);
}

function makeTable(ths,rows,foot){
  var wrap=div({style:{overflowX:"auto",borderRadius:"10px",border:"1px solid #e8e6df",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}});
  var tbl=el("table",{style:{width:"100%",borderCollapse:"collapse",background:"#fff"}});
  var thead=el("thead"); var tr=el("tr");
  ths.forEach(function(h){tr.appendChild(el("th",{style:Object.assign({},C.th,h.right?{textAlign:"right"}:{})},h.label));});
  thead.appendChild(tr); tbl.appendChild(thead);
  var tbody=el("tbody");
  rows.forEach(function(row,i){
    var tr=el("tr",{style:{background:i%2===0?"#fff":"#fafaf8"}});
    row.forEach(function(cell,j){
      var td=el("td",{style:Object.assign({},C.td,ths[j]&&ths[j].right?{textAlign:"right"}:{},cell.bold?{fontWeight:"600"}:{})});
      if(typeof cell.content==="string"||typeof cell.content==="number") td.textContent=cell.content;
      else if(cell.content) td.appendChild(cell.content);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  if(foot){
    var tfoot=el("tfoot"); var tr=el("tr",{style:{background:"#f0f0ee"}});
    foot.forEach(function(cell,i){
      var td=el("td",{colSpan:cell.span||1,style:Object.assign({},C.td,{fontWeight:"600"},ths[i]&&ths[i].right?{textAlign:"right"}:{})});
      if(typeof cell.content==="string"||typeof cell.content==="number") td.textContent=cell.content;
      else if(cell.content) td.appendChild(cell.content);
      tr.appendChild(td);
    });
    tfoot.appendChild(tr); tbl.appendChild(tfoot);
  }
  wrap.appendChild(tbl); return wrap;
}

function scoreBadge(pct){
  if(pct===null||pct===undefined)return span({style:{color:"#999"}},"—");
  return span({style:bdg(pct>=70?"green":pct>=50?"amber":"red")},pct+"%");
}

function codeBadge(text){return code({style:{fontWeight:"700",fontSize:"13px",color:"#185FA5"}},text);}

// ── PDF Upload ─────────────────────────────────────────────────
function handlePdfUpload(file) {
  if(!file)return;
  setState({genStatus:"Loading PDF...",generating:true,genProgress:5});
  var loadScript=new Promise(function(res,rej){
    if(window.pdfjsLib){res();return;}
    var sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    sc.onload=res; sc.onerror=rej; document.head.appendChild(sc);
  });
  loadScript.then(function(){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    return file.arrayBuffer();
  }).then(function(ab){return window.pdfjsLib.getDocument({data:ab}).promise;})
  .then(function(pdf){
    var pc=Math.min(pdf.numPages,60);var i=1;
    function nextPage(text){
      if(i>pc)return Promise.resolve(text);
      var idx=i++;
      return pdf.getPage(idx).then(function(pg){return pg.getTextContent();}).then(function(tc){
        var t=text+tc.items.map(function(x){return x.str;}).join(" ")+"\n";
        setState({genProgress:5+Math.round((idx/pc)*20)});
        return nextPage(t);
      });
    }
    return nextPage("");
  }).then(function(text){
    var title=state.quizTitle||file.name.replace(".pdf","");
    setState({pdfText:text.slice(0,30000),quizTitle:title,genStatus:"PDF loaded — "+Math.round(text.length/1000)+"k characters",generating:false});
  }).catch(function(err){setState({genStatus:"Failed: "+err.message,generating:false});});
}

// ── Download results PNG ────────────────────────────────────────
function downloadResults() {
  var currentSub=getCurrentSub();
  if(!currentSub)return;
  var saqs=getSaqs(),mcqs=getMcqs(),maxMCQ=getMaxMCQ(),maxSAQ=getMaxSAQ(),maxTotal=getMaxTotal();
  var saqT=Object.values(currentSub.saqScores).reduce(function(a,b){return a+b;},0);
  var total=currentSub.mcqScore+saqT,pct=Math.round((total/maxTotal)*100);
  var lines=[];
  function line(t,sz,bold,col){lines.push({t:t||"",sz:sz||11,bold:!!bold,col:col||"#1a1a1a"});}
  function blank(){lines.push(null);}
  line(state.quiz.title,18,true); line("Results Report",13,false,"#555"); blank();
  line("Resident: "+currentSub.name+"   Code: "+currentSub.residentCode,11);
  line("Email: "+currentSub.email+"   Submitted: "+currentSub.submitted,11); blank();
  line("SCORE SUMMARY",12,true);
  line("MCQ: "+currentSub.mcqScore+"/"+maxMCQ+"   SAQ: "+saqT+"/"+maxSAQ+"   Total: "+total+"/"+maxTotal+" ("+pct+"%)",12,true,pct>=70?"#3B6D11":pct>=50?"#854F0B":"#A32D2D");
  blank(); line("─────────────────────────────────────────",9,false,"#ccc");
  line("SECTION A — MCQ REVIEW",12,true); blank();
  mcqs.forEach(function(q,i){
    var ans=(currentSub.answers[q.id]||"").trim().toUpperCase().charAt(0);
    var correct=ans===q.answer.trim().toUpperCase().charAt(0);
    line("Q"+(i+1)+". "+q.text,10,true);
    line((correct?"✓ Correct":"✗ Incorrect")+" Your answer: "+(currentSub.answers[q.id]||"—")+(correct?"":"  Correct: "+q.answer),10,false,correct?"#3B6D11":"#A32D2D");
    if(q.explanation)line("Explanation: "+q.explanation,9,false,"#444");
    blank();
  });
  line("─────────────────────────────────────────",9,false,"#ccc");
  line("SECTION B — SAQ FEEDBACK",12,true); blank();
  saqs.forEach(function(q,i){
    var sc=currentSub.saqScores[q.id];
    line("SAQ "+(i+1)+". "+q.text,10,true);
    line("Score: "+(sc!==undefined?sc:"—")+"/"+q.marks+" marks",10,false,"#185FA5");
    line("Answer: "+(currentSub.answers[q.id]||"(none)"),9,false,"#444");
    if(currentSub.saqFeedback[q.id])line("Feedback: "+currentSub.saqFeedback[q.id],9,false,"#185FA5");
    if(q.explanation)line("Model answer: "+q.explanation,9,false,"#444");
    blank();
  });
  var canvas=document.createElement("canvas"),margin=50,pw=794,maxW=pw-margin*2;
  canvas.width=pw;
  var ctx=canvas.getContext("2d");
  function wrap(text,size){
    var words=text.split(" "),wrapped=[],cur="";
    ctx.font=size+"px Arial";
    words.forEach(function(w){var t=cur?cur+" "+w:w;if(ctx.measureText(t).width>maxW){if(cur)wrapped.push(cur);cur=w;}else cur=t;});
    if(cur)wrapped.push(cur); return wrapped;
  }
  var h=margin;
  lines.forEach(function(l){if(!l){h+=8;return;}h+=wrap(l.t,l.sz).length*(l.sz*1.5);});
  h+=margin; canvas.height=h;
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,pw,h);
  ctx.fillStyle="#185FA5"; ctx.fillRect(0,0,pw,6);
  var y=margin+6;
  lines.forEach(function(l){
    if(!l){y+=8;return;}
    ctx.font=(l.bold?"bold ":"")+l.sz+"px Arial"; ctx.fillStyle=l.col;
    wrap(l.t,l.sz).forEach(function(row){ctx.fillText(row,margin,y);y+=l.sz*1.5;});
  });
  ctx.fillStyle="#185FA5"; ctx.fillRect(0,h-4,pw,4);
  ctx.font="9px Arial"; ctx.fillStyle="#888";
  ctx.fillText("EM Board Quiz Platform  "+new Date().toLocaleDateString(),margin,h-10);
  canvas.toBlob(function(blob){
    var url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download=(currentSub.name+"_"+state.quiz.title+"_results").replace(/\s+/g,"_")+".png";
    a.click(); URL.revokeObjectURL(url);
  },"image/png");
}

  if(t==="archive") {

      });

function renderArchiveDetail() {

function renderStudentEntry() {
  if(state.loading)return div({style:C.wrap},div({style:Object.assign({},C.card,{textAlign:"center",padding:"2rem"})},[
    div({style:{fontSize:"14px",color:"#666",marginBottom:"12px"}},"Loading quiz data..."),
    div({style:C.prog},div({style:Object.assign({},C.bar(100))})),
  ]));
  var qcInp=inp({style:Object.assign({},C.inp,{marginBottom:"12px"}),placeholder:"e.g. QUIZ4X7KM",value:state.studentQuizCode});
  qcInp.addEventListener("input",function(){state.studentQuizCode=qcInp.value.toUpperCase();});
  var rcInp=inp({style:Object.assign({},C.inp,{marginBottom:"16px"}),placeholder:"e.g. EM4X72",value:state.studentResCode});
  rcInp.addEventListener("input",function(){state.studentResCode=rcInp.value.toUpperCase();});
  var errEl=state.entryError?div({style:C.err},state.entryError):null;
  function tryBegin(){
    if(!state.quiz){
      setState({entryError:"Quiz data is still loading. Please wait a moment and try again."});
      Promise.all([
        api({action:"getQuiz"}).then(function(r){if(r.ok&&r.quizData)state.quiz=JSON.parse(r.quizData);}).catch(function(){}),
        api({action:"getResidents"}).then(function(r){if(r.ok&&r.residents)state.residents=JSON.parse(r.residents);}).catch(function(){}),
      ]).then(function(){setState({entryError:""});});
      return;
    }
    if(state.studentQuizCode!==state.quiz.code){setState({entryError:"Invalid quiz code."});return;}
    if(!state.quiz.published){setState({entryError:"Quiz not published yet."});return;}
    var res=state.residents.find(function(r){return r.residentCode===state.studentResCode;});
    if(!res){
      api({action:"getResidents"}).then(function(r){
        if(r.ok&&r.residents){
          var fresh=JSON.parse(r.residents);
          state.residents=fresh;
          var found=fresh.find(function(x){return x.residentCode===state.studentResCode;});
          if(!found){setState({entryError:"Resident code not found. Check with your instructor."});return;}
          setState({currentAnswers:{},entryError:"",view:"quiz"});
          startTimer();
        }
      }).catch(function(){setState({entryError:"Network error. Please try again."});});
      return;
    }
    if(state.submissions.find(function(s){return s.residentCode===state.studentResCode;})){setState({entryError:"You have already submitted this quiz."});return;}
    setState({currentAnswers:{},entryError:"",view:"quiz"});
    startTimer();
  }
  var beginBtn=btn({style:C.btnP},"Begin quiz");
  beginBtn.addEventListener("click",tryBegin);
  var backBtn=btn({style:C.btn},"Back");
  backBtn.addEventListener("click",function(){setState({view:"home"});});
  var children=[
    h2({style:{fontSize:"18px",fontWeight:"600",marginBottom:"1rem"}},"Start quiz"),
    span({style:Object.assign({},bdg("blue"),{display:"inline-block",marginBottom:"16px"})},"45 minutes · 40 MCQs · 10 SAQs"),
    el("label",{style:C.label},"Quiz code"),qcInp,

  return div({style:C.wrap},div({style:C.card},children));
}

function renderQuiz() {
  var mcqs=getMcqs(),saqs=getSaqs(),allQs=state.quiz.questions;

  var res=getActiveResident();

  var header=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",position:"sticky",top:"0",background:"#f8f8f6",zIndex:"10",borderBottom:"1px solid #eee",marginBottom:"8px"}},[

    textarea.addEventListener("input",function(){state.currentAnswers[q.id]=textarea.value;});

  submitBtn.addEventListener("click",submitQuiz);

  // Add class for targeted updates
  header.querySelector(".muted") && (header.querySelector(".muted").className="muted muted-answered");

function renderSubmitted() {
  var res=getActiveResident();
  return div({style:C.wrap},div({style:Object.assign({},C.card,{textAlign:"center",padding:"3rem"})},[

function renderResults() {

function api(body) {

    method: "POST", headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body),
  }).then(function(r) { return r.json(); });
}

function genCode() { return "EM" + Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(10+Math.random()*90); }

function callClaude(messages, sys) {
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:8000, system:sys, messages:messages }),
  }).then(function(r) { return r.json(); });
}

function parseArr(data) {
  var raw = (data.content||[]).map(function(b){return b.text||"";}).join("");
  var match = raw.match(/\[[\s\S]*/);
  if (!match) throw new Error("No JSON array. Sample: "+raw.slice(0,200));
  var str = match[0];
  var lb = str.lastIndexOf("}");
  if (lb!==-1) str = str.slice(0,lb+1)+"]";
  str = str.replace(/,\s*([}\]])/g,"$1");
  try { return JSON.parse(str); }
  catch(e) {
    var objs=[]; var re=/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*/g; var m;
    while((m=re.exec(str))!==null){try{objs.push(JSON.parse(m[0]));}catch(e2){}}
    if(objs.length) return objs;
    throw new Error("Parse failed.");
  }
}

function Timer(props) {
  var st=useState(QUIZ_DURATION); var left=st[0]; var setLeft=st[1];
  useEffect(function(){
    if(left<=0){props.onExpire();return;}
    var t=setTimeout(function(){setLeft(function(l){return l-1;});},1000);
    return function(){clearTimeout(t);};
  },[left]);
  var color=left<300?"#A32D2D":left<600?"#854F0B":"#185FA5";
  return (
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{fontSize:18,fontWeight:700,color:color,fontVariantNumeric:"tabular-nums",letterSpacing:1}}>{fmtTime(left)}</div>
      <div style={{width:80,height:5,borderRadius:4,background:"#eee",overflow:"hidden"}}>
        <div style={S.bar(Math.round((left/QUIZ_DURATION)*100),color)}/>
      </div>
    </div>
  );
}

function ScoreBadge(props) {
  var pct=props.pct;
  if(pct===null||pct===undefined) return <span style={{color:"#999"}}>—</span>;
  return <span style={S.bdg(pct>=70?"green":pct>=50?"amber":"red")}>{pct}%</span>;
}

        <thead><tr>{ths.map(function(h,i){return <th key={i} style={Object.assign({},S.th,h.right?{textAlign:"right"}:{})}>{h.label}</th>;})}</tr></thead>
        <tbody>{rows.map(function(row,i){

      var sc=document.createElement("script");
      sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      sc.onload=res; sc.onerror=rej; document.head.appendChild(sc);
    });
    loadScript.then(function(){
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      return file.arrayBuffer();
    }).then(function(ab){return window.pdfjsLib.getDocument({data:ab}).promise;})
    .then(function(pdf){
      var pc=Math.min(pdf.numPages,60); var i=1;
      function nextPage(text){
        if(i>pc)return Promise.resolve(text);
        var idx=i++;
        return pdf.getPage(idx).then(function(pg){return pg.getTextContent();}).then(function(tc){
          var t=text+tc.items.map(function(x){return x.str;}).join(" ")+"\n";
          setGenProgress(5+Math.round((idx/pc)*20));
          return nextPage(t);
        });
      }
      return nextPage("");
    }).then(function(text){

      if(!quizTitle)setQuizTitle(file.name.replace(".pdf",""));
      setGenStatus("PDF loaded successfully");
    }).catch(function(err){setGenStatus("Failed: "+err.message);})
    .finally(function(){setGenerating(false);});

  function generateQuiz() {
    if(!pdfText)return;
    setGenerating(true); setGenProgress(5);
    var base="You are a senior Emergency Medicine board examiner creating questions at ABEM/FCEM level for EM residents.\nRULES: 80% from chapter text (facts, tables, algorithms, figures). 20% from recent landmark trials/ACEP guidelines.\nVignettes must include chief complaint, vitals, key exam/investigation findings. Distractors must be plausible.\nquestionSubtype: vignette | factual | table_algorithm | graphic";
    var mcqSys=base+"\nEach MCQ = 2 marks. Return ONLY a valid JSON array of exactly 10 MCQ objects, no markdown:\n[{\"id\":\"q1\",\"type\":\"mcq\",\"questionSubtype\":\"vignette\",\"text\":\"...\",\"options\":[\"A. ...\",\"B. ...\",\"C. ...\",\"D. ...\"],\"answer\":\"A\",\"explanation\":\"Full explanation.\"}]\nGenerate EXACTLY 10 MCQs.";
    var saqSys=base+"\nEach SAQ: max 2 subsections (a)(b), total marks 4-6, brief structured answers (3-5 bullet points per subsection). Return ONLY a valid JSON array of exactly 5 SAQ objects, no markdown:\n[{\"id\":\"s1\",\"type\":\"saq\",\"questionSubtype\":\"algorithm\",\"text\":\"Question with (a)(b)\",\"totalMarks\":5,\"sampleAnswer\":\"(a)...[3m]\\n(b)...[2m]\",\"markingCriteria\":\"(a) 1 mark each for: x,y,z\",\"explanation\":\"Concise explanation.\"}]\nGenerate EXACTLY 5 SAQs.";
    var mcqBatches=[
      {label:"MCQs 1-10",prompt:"Generate MCQs 1-10: ALL 10 must be clinical vignette type with full patient presentation, vitals, exam findings."},
      {label:"MCQs 11-20",prompt:"Generate MCQs 11-20: ALL 10 must be factual testing thresholds, criteria, classifications, drug doses from the chapter."},
      {label:"MCQs 21-30",prompt:"Generate MCQs 21-30: ALL 10 based on tables, scoring systems, diagnostic criteria, algorithms from the chapter."},
      {label:"MCQs 31-40",prompt:"Generate MCQs 31-40: 4 graphic/image-based (ECG, X-ray, lab pattern) and 6 additional clinical vignettes."},
    ];
    var saqBatches=[
      {label:"SAQs 1-5",prompt:"Generate exactly 5 concise board-level EM SAQs. Each: exactly 2 subsections (a)(b), total marks 4-6. Focus on management and clinical decisions."},
      {label:"SAQs 6-10",prompt:"Generate exactly 5 concise board-level EM SAQs. Each: exactly 2 subsections (a)(b), total marks 4-6. Focus on investigations, differentials, evidence-based treatment. Different topics from SAQs 1-5."},
    ];
    var allMCQs=[]; var allSAQs=[];
    var totalSteps=mcqBatches.length+saqBatches.length;
    function runBatches(batches,sys,collector,offset){
      var chain=Promise.resolve();
      batches.forEach(function(batch,i){
        chain=chain.then(function(){
          var step=offset+i+1;
          setGenStatus("Generating "+batch.label+" ("+step+"/"+totalSteps+")...");
          setGenProgress(Math.round((step/(totalSteps+1))*90));
          return callClaude([{role:"user",content:batch.prompt+"\n\nCHAPTER:\n"+pdfText}],sys)
            .then(function(data){
              if(data.error)throw new Error(data.error.message);
              parseArr(data).forEach(function(q){collector.push(q);});
            });
        });
      });
      return chain;
    }
    runBatches(mcqBatches,mcqSys,allMCQs,0)
      .then(function(){return runBatches(saqBatches,saqSys,allSAQs,mcqBatches.length);})
      .then(function(){
        var questions=allMCQs.slice(0,40).map(function(q,i){return Object.assign({},q,{id:"q"+(i+1),type:"mcq",marks:2});})
          .concat(allSAQs.slice(0,10).map(function(q,i){return Object.assign({},q,{id:"s"+(i+1),type:"saq",marks:q.totalMarks||5});}));
        if(!questions.length)throw new Error("No questions generated.");
        var code="QUIZ"+Math.random().toString(36).substring(2,7).toUpperCase();
        var newQuiz={title:quizTitle||"Medical Quiz",questions:questions,code:code,published:false};
        setQuiz(newQuiz);
        api({action:"saveQuiz",quizData:JSON.stringify(newQuiz)}).catch(function(){});
        setGenProgress(100);
        setGenStatus("Done! "+questions.filter(function(q){return q.type==="mcq";}).length+" MCQs + "+questions.filter(function(q){return q.type==="saq";}).length+" SAQs generated.");
        setView("adminDashboard");
      })
      .catch(function(err){setGenStatus("Error: "+(err.message||String(err)));})
      .finally(function(){setGenerating(false);});
  }

  function markSAQs() {

    setMarking(true); setMarkProgress(0);

    var chain=Promise.resolve();
    updated.forEach(function(sub,si){
      chain=chain.then(function(){

        var sys="Senior EM board examiner. Mark each SAQ out of its totalMarks. Return ONLY JSON array:\n[{\"id\":\"q_id\",\"score\":0,\"feedback\":\"constructive feedback\"}]";
        return callClaude([{role:"user",content:"Mark "+saqs.length+" SAQs:\n\n"+saqList}],sys)
          .then(function(data){
            if(data.error)throw new Error(data.error.message);

            results.forEach(function(r){sub.saqScores[r.id]=typeof r.score==="number"?r.score:0;sub.saqFeedback[r.id]=r.feedback||"";});
            saqs.forEach(function(q){if(sub.saqScores[q.id]===undefined){sub.saqScores[q.id]=0;sub.saqFeedback[q.id]="Not marked.";}});
          })
          .catch(function(err){saqs.forEach(function(q){sub.saqScores[q.id]=0;sub.saqFeedback[q.id]="Error: "+err.message;});})
          .finally(function(){
            var saqTotal=Object.values(sub.saqScores).reduce(function(a,b){return a+b;},0);
            sub.totalScore=sub.mcqScore+saqTotal; sub.maxScore=maxTotal;

          });
      });
    });
    chain.finally(function(){setMarkProgress(100);setMarking(false);});
  }

    line("Total Score: "+total+" / "+maxTotal+"   ("+pct+"%)",12,true,pct>=70?"#3B6D11":pct>=50?"#854F0B":"#A32D2D");
    blank(); line("─────────────────────────────────────────",9,false,"#ccc");
    line("SECTION A — MCQ REVIEW",12,true); blank();
    mcqs.forEach(function(q,i){
      var ans=(currentSub.answers[q.id]||"").trim().toUpperCase().charAt(0);
      var correct=ans===q.answer.trim().toUpperCase().charAt(0);
      line("Q"+(i+1)+". "+q.text,10,true);
      line((correct?"✓ Correct":"✗ Incorrect")+"   Your answer: "+(currentSub.answers[q.id]||"—")+(correct?"":"   Correct: "+q.answer),10,false,correct?"#3B6D11":"#A32D2D");
      if(q.explanation)line("Explanation: "+q.explanation,9,false,"#444");
      blank();
    });
    line("─────────────────────────────────────────",9,false,"#ccc");
    line("SECTION B — SAQ FEEDBACK",12,true); blank();
    saqs.forEach(function(q,i){
      var sc=currentSub.saqScores[q.id];
      line("SAQ "+(i+1)+". "+q.text,10,true);
      line("Score: "+(sc!==undefined?sc:"—")+" / "+q.marks+" marks",10,false,"#185FA5");

      if(q.explanation)line("Model answer: "+q.explanation,9,false,"#444");
      blank();
    });
    var canvas=document.createElement("canvas");
    var margin=50; var pageW=794; var maxW=pageW-margin*2;
    canvas.width=pageW;
    var ctx=canvas.getContext("2d");
    function wrapText(ctx,text,maxWidth,size){
      var words=text.split(" "); var wrapped=[]; var cur="";
      ctx.font=size+"px Arial";
      words.forEach(function(w){var test=cur?cur+" "+w:w;if(ctx.measureText(test).width>maxWidth){if(cur)wrapped.push(cur);cur=w;}else cur=test;});
      if(cur)wrapped.push(cur);
      return wrapped;
    }
    var totalH=margin;
    lines.forEach(function(l){if(!l){totalH+=9;return;}totalH+=wrapText(ctx,l.txt,maxW,l.size).length*(l.size*1.5);});
    totalH+=margin; canvas.height=totalH;
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,pageW,totalH);
    ctx.fillStyle="#185FA5"; ctx.fillRect(0,0,pageW,6);
    var y=margin+6;
    lines.forEach(function(l){
      if(!l){y+=9;return;}
      ctx.font=(l.bold?"bold ":"")+l.size+"px Arial"; ctx.fillStyle=l.color;
      wrapText(ctx,l.txt,maxW,l.size).forEach(function(row){ctx.fillText(row,margin,y);y+=l.size*1.5;});
    });
    ctx.fillStyle="#185FA5"; ctx.fillRect(0,totalH-4,pageW,4);
    ctx.font="9px Arial"; ctx.fillStyle="#888";
    ctx.fillText("EM Board Quiz Platform   |   "+new Date().toLocaleDateString(),margin,totalH-10);
    canvas.toBlob(function(blob){
      var url=URL.createObjectURL(blob); var a=document.createElement("a");

    },"image/png");
  }

              {changeError&&<div style={S.err}>{changeError}</div>}
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button style={S.btn} onClick={function(){setChangeStep(1);setChangeError("");}}>Back</button>
                <button style={S.btnP} onClick={function(){
                  if(changeNew.length<6){setChangeError("Min 6 characters.");return;}
                  if(changeNew!==changeConfirm){setChangeError("Codes don't match.");return;}
                  localStorage.setItem(ADMIN_STORAGE_KEY,changeNew);
                  setAdminPassword(changeNew);setChangeOld("");setChangeNew("");setChangeConfirm("");setChangeError("");setChangeStep(1);setChangeSuccess(true);
                }}>Save new code</button>
              </div>
            </div>}
          </div>}
        </div>}
      </div>
    );
  }

  if(view==="archiveDetail") {
    var entry=archived[viewingArchive];
    if(!entry)return <div style={S.wrap}><p style={S.muted}>Not found.</p></div>;
    var aMcqs=(entry.quiz.questions||[]).filter(function(q){return q.type==="mcq";});
    var aSaqs=(entry.quiz.questions||[]).filter(function(q){return q.type==="saq";});
    var aMaxMCQ=aMcqs.length*2; var aMaxSAQ=aSaqs.reduce(function(a,q){return a+q.marks;},0); var aMax=aMaxMCQ+aMaxSAQ;
    return <div style={S.wrap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h1 style={S.h1}>{entry.quiz.title}</h1><div style={S.muted}>Archived {entry.archivedAt} · Code: {entry.quiz.code}</div></div>
        <button style={S.btnS} onClick={function(){setView("adminDashboard");setActiveTab("archive");}}>Back</button>
      </div>
      {entry.submissions.length===0&&<div style={S.muted}>No submissions.</div>}
      {entry.submissions.length>0&&<DataTable
        ths={[{label:"#"},{label:"Code"},{label:"Name"},{label:"Email"},{label:"MCQ ("+aMaxMCQ+")",right:true},{label:"SAQ ("+aMaxSAQ+")",right:true},{label:"Total ("+aMax+")",right:true},{label:"%",right:true}]}
        rows={entry.submissions.map(function(sub,i){
          var saqT=Object.values(sub.saqScores||{}).reduce(function(a,b){return a+b;},0);
          var pct=sub.totalScore!==null?Math.round((sub.totalScore/aMax)*100):null;
          return [{content:i+1},{content:<code style={{fontWeight:700,fontSize:13}}>{sub.residentCode}</code>},
            {content:sub.name},{content:sub.email},{content:sub.mcqScore},{content:saqT||"—"},
            {content:sub.totalScore!==null?sub.totalScore:"—",bold:true},{content:<ScoreBadge pct={pct}/>}];
        })}
      />}
    </div>;
  }

  if(view==="studentEntry") {
    if(loading) return (
      <div style={S.wrap}>
        <div style={Object.assign({},S.card,{textAlign:"center",padding:"2rem"})}>
          <div style={{fontSize:14,color:"#666"}}>Loading quiz data...</div>
          <div style={Object.assign({},S.prog,{marginTop:12})}><div style={S.bar(100,"#185FA5")}/></div>
        </div>
      </div>
    );
    return (
    <div style={S.wrap}>
      <div style={S.card}>
        <h2 style={S.h2}>Start quiz</h2>
        <div style={Object.assign({},S.bdg("blue"),{marginBottom:16})}>45 minutes · 40 MCQs · 10 SAQs</div>
        <label style={S.label}>Quiz code</label>
        <input style={Object.assign({},S.inp,{marginBottom:12})} placeholder="e.g. QUIZ4X7KM" value={studentQuizCode} onChange={function(e){setStudentQuizCode(e.target.value.toUpperCase());}} />
        <label style={S.label}>Your resident code</label>
        <input style={Object.assign({},S.inp,{marginBottom:16})} placeholder="e.g. EM4X72" value={studentResCode} onChange={function(e){setStudentResCode(e.target.value.toUpperCase());}} />
        {entryError&&<div style={S.err}>{entryError}</div>}
        <div style={{display:"flex",gap:8}}>
          <button style={S.btn} onClick={function(){setView("home");}}>Back</button>
          <button style={S.btnP} onClick={function(){
            if(!quiz||studentQuizCode!==quiz.code){setEntryError("Invalid quiz code.");return;}
            if(!quiz.published){setEntryError("Quiz not published yet.");return;}
            var res=residents.find(function(r){return r.residentCode===studentResCode;});
            if(!res){setEntryError("Resident code not found. Check with your instructor.");return;}
            if(submissions.find(function(s){return s.residentCode===studentResCode;})){setEntryError("You have already submitted this quiz.");return;}
            setCurrentAnswers({}); setEntryError(""); setView("quiz");
          }}>Begin quiz</button>
        </div>
      </div>
    </div>
  );

  if(view==="quiz") {
    var allQs=quiz.questions;
    var answered=Object.keys(currentAnswers).filter(function(k){return currentAnswers[k];}).length;
    return <div style={S.wrap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",position:"sticky",top:0,background:"#f8f8f6",zIndex:10,borderBottom:"1px solid #eee",marginBottom:8}}>
        <div><div style={{fontWeight:600,fontSize:15}}>{quiz.title}</div><div style={S.muted}>{activeResident&&activeResident.name} · {answered}/{allQs.length} answered</div></div>
        <Timer onExpire={submitQuiz}/>
      </div>
      <div style={S.prog}><div style={S.bar(Math.round((answered/allQs.length)*100))}/></div>
      <div style={{fontWeight:600,fontSize:15,margin:"1.25rem 0 0.75rem"}}>Section A — Multiple Choice <span style={Object.assign({},S.muted,{fontWeight:400})}>(2 marks each)</span></div>
      {mcqs.map(function(q,i){return <div key={q.id} style={Object.assign({},S.card,{marginBottom:12})}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={S.muted}>Q{i+1} of {mcqs.length}</span><span style={S.bdg("blue")}>2 marks</span></div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:12,lineHeight:1.5}}>{q.text}</div>
        {q.options.map(function(opt){return <button key={opt} style={S.opt(currentAnswers[q.id]===opt)} onClick={function(){setCurrentAnswers(function(a){var n=Object.assign({},a);n[q.id]=opt;return n;});}}>{opt}</button>;})}
      </div>;})}
      <div style={{fontWeight:600,fontSize:15,margin:"1.5rem 0 0.75rem"}}>Section B — Short Answer Questions <span style={Object.assign({},S.muted,{fontWeight:400})}>(variable marks)</span></div>
      {saqs.map(function(q,i){return <div key={q.id} style={Object.assign({},S.card,{marginBottom:12})}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={S.muted}>SAQ {i+1} of {saqs.length}</span><span style={S.bdg("amber")}>{q.marks} marks</span></div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:10,whiteSpace:"pre-line",lineHeight:1.5}}>{q.text}</div>
        <textarea style={S.ta} placeholder="Write your structured answer here..." value={currentAnswers[q.id]||""} onChange={function(e){setCurrentAnswers(function(a){var n=Object.assign({},a);n[q.id]=e.target.value;return n;});}}/>
      </div>;})}
      <div style={{textAlign:"right",padding:"1rem 0 2rem"}}><button style={S.btnP} onClick={submitQuiz}>Submit quiz</button></div>
    </div>;
  }

  if(view==="submitted") return (
    <div style={S.wrap}>
      <div style={Object.assign({},S.card,{textAlign:"center",padding:"3rem"})}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <h2 style={Object.assign({},S.h2,{textAlign:"center"})}>Submitted successfully</h2>
        <p style={Object.assign({},S.muted,{marginBottom:8})}>Thank you, <strong>{activeResident&&activeResident.name}</strong>. Your answers have been recorded.</p>
        <p style={S.muted}>Results will be released by your instructor. Save your resident code <strong style={{color:"#185FA5"}}>{activeResident&&activeResident.residentCode}</strong> to check results later.</p>
        <button style={Object.assign({},S.btn,{marginTop:20})} onClick={function(){setView("home");}}>Back to home</button>
      </div>
    </div>
  );

  if(view==="checkResults") return (
    <div style={S.wrap}>
      <div style={S.card}>
        <h2 style={S.h2}>Check my results</h2>
        <label style={S.label}>Your resident code</label>
        <input style={Object.assign({},S.inp,{marginBottom:16})} placeholder="e.g. EM4X72" value={resCodeLookup} onChange={function(e){setResCodeLookup(e.target.value.toUpperCase());}} />
        {lookupError&&<div style={S.err}>{lookupError}</div>}
        <div style={{display:"flex",gap:8}}>
          <button style={S.btn} onClick={function(){setView("home");}}>Back</button>
          <button style={S.btnP} onClick={function(){
            setLookupError("");
            api({action:"getSubmissions"}).then(function(r){
              if(!r.ok){setLookupError("Could not fetch results. Please try again.");return;}
              var allSubs=(r.submissions||[]).map(parseSub);
              setSubmissions(allSubs);
              var sub=allSubs.find(function(s){return s.residentCode===resCodeLookup;});
              if(!sub){setLookupError("No submission found for this code.");return;}
              api({action:"getReleased"}).then(function(rel){
                if(rel.released!=="true"){setLookupError("Results have not been released yet. Please check back later.");return;}
                setResultsReleased(true);
                setSubmittedId(sub.id); setView("results");
              }).catch(function(){setLookupError("Could not check release status.");});
            }).catch(function(){setLookupError("Network error. Please try again.");});
          }}>View results</button>
        </div>
      </div>
    </div>
  );

  if(view==="results"&&currentSub) {
    var saqT2=Object.values(currentSub.saqScores).reduce(function(a,b){return a+b;},0);
    var total2=currentSub.mcqScore+saqT2;
    var pct2=Math.round((total2/maxTotal)*100);
    return <div style={S.wrap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h1 style={S.h1}>Results</h1><div style={S.muted}>{currentSub.name} · Code: {currentSub.residentCode}</div></div>
        <div style={{display:"flex",gap:8}}>
          <button style={S.btnS} onClick={function(){setView("home");}}>Home</button>
          <button style={S.btnP} onClick={downloadResultsPDF}>⬇ Download</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
        {[["MCQ",currentSub.mcqScore+"/"+maxMCQ],["SAQ",saqT2+"/"+maxSAQ],["Total",total2+"/"+maxTotal],["Score",pct2+"%"]].map(function(item){
          return <div key={item[0]} style={{background:"#fff",border:"1px solid #e8e6df",borderRadius:10,padding:"1rem",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:12,color:"#666",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{item[0]}</div>
            <div style={{fontSize:22,fontWeight:700,color:"#185FA5"}}>{item[1]}</div>
          </div>;
        })}
      </div>
      <div style={{fontWeight:600,marginBottom:10,fontSize:15}}>Section A — MCQ Review</div>
      {mcqs.map(function(q,i){
        var ans=(currentSub.answers[q.id]||"").trim().toUpperCase().charAt(0);
        var correct=ans===q.answer.trim().toUpperCase().charAt(0);
        return <div key={q.id} style={Object.assign({},S.card,{marginBottom:8,borderLeft:"4px solid "+(correct?"#3B6D11":"#A32D2D")})}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={S.muted}>Q{i+1}</span>
            <span style={{fontSize:13,color:correct?"#3B6D11":"#A32D2D",fontWeight:600}}>{correct?"+2 marks":"0 marks"}</span>
          </div>
          <div style={{fontSize:14,fontWeight:500,marginBottom:8,lineHeight:1.5}}>{q.text}</div>
          <div style={{fontSize:13,marginBottom:q.explanation?8:0}}>
            Your answer: <span style={{color:correct?"#3B6D11":"#A32D2D",fontWeight:600}}>{currentSub.answers[q.id]||"—"}</span>
            {!correct&&<span style={{color:"#666"}}> · Correct: <span style={{color:"#3B6D11",fontWeight:600}}>{q.answer}</span></span>}
          </div>
          {q.explanation&&<div style={{fontSize:13,color:"#444",background:"#f8f8f6",borderRadius:6,padding:"8px 12px",lineHeight:1.5}}><strong>Explanation: </strong>{q.explanation}</div>}
        </div>;
      })}
      <div style={{fontWeight:600,margin:"20px 0 10px",fontSize:15}}>Section B — SAQ Feedback</div>
      {saqs.map(function(q,i){
        var sc=currentSub.saqScores[q.id];
        return <div key={q.id} style={Object.assign({},S.card,{marginBottom:10})}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={S.muted}>SAQ {i+1}</span>
            <span style={{fontSize:13,fontWeight:600}}>{sc!==undefined?sc:"—"}/{q.marks} marks</span>
          </div>
          <div style={{fontSize:14,fontWeight:500,marginBottom:8,whiteSpace:"pre-line",lineHeight:1.5}}>{q.text}</div>
          <div style={{fontSize:13,color:"#444",marginBottom:10,background:"#f8f8f6",borderRadius:6,padding:"8px 12px",lineHeight:1.5}}>
            <strong>Your answer: </strong>{currentSub.answers[q.id]||"(no answer)"}
          </div>
          {currentSub.saqFeedback[q.id]&&<div style={{fontSize:13,color:"#185FA5",marginBottom:8,lineHeight:1.5}}><strong>Feedback: </strong>{currentSub.saqFeedback[q.id]}</div>}
          {q.explanation&&<div style={{fontSize:13,color:"#444",background:"#f8f8f6",borderRadius:6,padding:"8px 12px",lineHeight:1.5}}><strong>Model answer: </strong>{q.explanation}</div>}
        </div>;
      })}
    </div>;
  }

  return <div style={S.wrap}><p style={S.muted}>Loading...</p></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
  // Fallback error display
  window.onerror = function(msg, src, line) {
    var r = document.getElementById("root");
    if(r && !r.hasChildNodes()) {
      r.innerHTML = '<div style="padding:2rem;font-family:sans-serif;color:#A32D2D;background:#FCEBEB;border-radius:8px;margin:2rem">' +
        '<strong>Error loading app:</strong><br>' + msg + '<br><small>' + src + ' line ' + line + '</small></div>';
    }
  };
</script>
</body>
</html>
